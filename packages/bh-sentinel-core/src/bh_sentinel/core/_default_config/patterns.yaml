# bh-sentinel Pattern Library
#
# patterns_version: "1.0.0"
# requires_taxonomy_version: "1.0.x"
#
# Each domain contains flags, each flag contains patterns, negation phrases,
# optional clinical shorthand, and a default confidence score. Patterns are
# compiled to regex at load time (case-insensitive). The pattern matcher
# applies negation and temporal detection after matching.
#
# Convention: All negation_phrases entries are treated as regex patterns and
# compiled with re.IGNORECASE. Plain strings like "denies" work because they
# are valid regex. Use regex syntax (e.g. "(?:\-|negative) (?:for )?SI")
# when matching needs to be more specific than a literal substring.
#
# Covers all 40 flags across 6 domains. See config/flag_taxonomy.json for
# flag definitions and default severity levels. See docs/flag-taxonomy.md
# for full clinical definitions and C-SSRS mappings.

_meta:
  patterns_version: "1.0.0"
  requires_taxonomy_version: "1.0.x"

# =============================================================================
# SELF-HARM AND SUICIDAL IDEATION (SH-001 through SH-008)
# =============================================================================

self_harm:
  SH-001:  # Passive death wish (HIGH)
    patterns:
      - "wish(?:es|ed)? (?:I |he |she |they )?(?:was|were|would be) dead"
      - "better off dead"
      - "don'?t want to (?:be alive|live|wake up)"
      - "wish I (?:could|would) (?:just )?die"
      - "wish I (?:could|would) (?:go to )?sleep and (?:never|not) wake up"
      - "everyone would be better off without me"
      - "no (?:reason|point) (?:to|in) (?:live|living|go on|going on|keep going|continuing)"
      - "what'?s the point (?:anymore|of (?:living|going on|any of this))"
      - "can'?t (?:do this|take it|go on) anymore"
      - "just want (?:it|everything) to (?:stop|end|be over)"
    negation_phrases: ["don't", "no longer", "used to", "not anymore", "denies"]
    confidence: 0.92

  SH-002:  # Active SI - nonspecific (CRITICAL)
    patterns:
      - "want(?:s|ed|ing)? to (?:kill|end) (?:myself|himself|herself|themselves|themself|my life|his life|her life|their life|it all)"
      - "thinking (?:about|of) (?:killing|ending) (?:myself|himself|herself|themselves|themself|my life|his life|her life|their life)"
      - "suicidal (?:(?:or homicidal )?thoughts?|(?:or homicidal )?ideation|feelings)"
      - "(?:can'?t|cannot) (?:stop|keep from) thinking about (?:suicide|dying|ending it)"
    clinical_shorthand:
      - "pt (?:c/o|reports|endorses) SI"
      - "(?:\\+|positive) (?:for )?SI"
      - "SI (?:present|endorsed|reported|active)"
      - "\\bSI\\b"
      - "(?:endorses?|reports?) (?:active )?(?:suicidal )?(?:thoughts?|ideation)"
    negation_phrases: ["denies", "no", "not", "never", "\\-SI", "(?:\\-|negative) (?:for )?SI"]
    confidence: 0.95

  SH-003:  # Active SI - with method (CRITICAL)
    patterns:
      - "(?:kill|end|hang|shoot|cut|stab|drown|poison|overdose|jump)(?:ing)? (?:myself|my life)"
      - "thinking (?:about|of) (?:taking|using) (?:pills|a gun|a knife|a rope)"
      - "know(?:s)? how (?:I would|I'd|to) (?:do it|end it|kill myself)"
      - "have (?:a )?(?:plan|method|way) to (?:kill myself|end (?:it|my life))"
    clinical_shorthand:
      - "SI (?:with|w/) method"
      - "pt (?:reports|endorses|describes) method"
    negation_phrases: ["denies", "no", "not", "never", "(?:\\-|negative) (?:for )?SI"]
    confidence: 0.96

  SH-004:  # Active SI - with some intent, no plan (CRITICAL)
    patterns:
      - "(?:I'?m |I am )?going to (?:kill myself|end (?:my life|it(?: all)?))"
      - "(?:I will|I'?m going to) (?:do it|end it|kill myself)"
      - "(?:can'?t|don'?t) (?:promise|guarantee) (?:I )?(?:won'?t|will not) (?:do (?:something|it)|hurt myself|try)"
      - "don'?t (?:think|know if) (?:I )?can (?:stay|keep myself|be) safe"
      - "(?:might|may|probably will|probably going to) (?:try to )?(?:kill myself|end it|do it|do something)"
      - "(?:it'?s |is )?(?:only )?a matter of time"
      - "don'?t (?:want to|think I can) (?:fight it|resist|hold on) (?:anymore|much longer)"
      - "(?:can'?t|cannot) (?:fight it|hold on|resist) (?:anymore|much longer)"
    clinical_shorthand:
      - "SI (?:with|w/) (?:some )?intent"
      - "pt (?:reports|endorses|expresses) intent"
      - "intent (?:present|endorsed|reported) without (?:specific )?plan"
    negation_phrases: ["denies", "no", "not", "never", "(?:\\-|negative) (?:for )?SI"]
    confidence: 0.96

  SH-005:  # Active SI - with plan and intent (CRITICAL)
    patterns:
      - "(?:I'?m |I am |she is |he is |they are )?going to (?:take|use|get) (?:the |my |her |his |their |all (?:the |my |her |his |their )?)(?:pills|gun|rope|knife)"
      - "(?:plan|know) (?:exactly )?(?:how|when|where) (?:and (?:when|how) )?(?:I'?m |I am )?going to (?:do it|kill myself|end it)"
      - "have (?:a |my )?plan and (?:I'?m |I am )?going to (?:go through with it|do it|follow through)"
      - "(?:tonight|tomorrow|this weekend|when (?:everyone|they|he|she|(?:my |her |his )?roommate) (?:leaves?|is gone|falls? asleep)) (?:I'?m |I am |she is |he is )?going to"
      - "(?:I'?ve |I have )?(?:decided|made up my mind) (?:to|that I'?m going to) (?:end it|kill myself|do it)"
      - "suicidal ideation (?:with|w/) plan"
    clinical_shorthand:
      - "SI (?:with|w/) plan and intent"
      - "pt (?:reports|endorses) plan and intent"
      - "active SI (?:with|w/) (?:specific )?plan and intent"
    negation_phrases: ["denies", "no", "not", "never", "(?:\\-|negative) (?:for )?SI"]
    confidence: 0.97

  SH-006:  # Preparatory behavior (CRITICAL)
    patterns:
      - "(?:writing|wrote|written) (?:a )?(?:goodbye|farewell|suicide) (?:letter|note|message)"
      - "(?:giving|gave) away (?:my |his |her |their )?(?:things|belongings|possessions|stuff)"
      - "(?:saving|collecting|stockpiling|hoarding) (?:pills|medication|meds)"
      - "(?:bought|purchased|obtained|got) (?:a )?(?:gun|firearm|rope|knife|razor)"
      - "(?:researching|looking up|googling|searching) (?:ways|how|methods) to (?:kill myself|die|end it|commit suicide)"
      - "(?:went|going|drove) to (?:the )?(?:bridge|overpass|roof|train tracks|railroad)"
      - "(?:put(?:ting)?|getting|got) (?:my )?(?:affairs|things|finances|will) in order"
      - "(?:making|made) (?:arrangements|plans) (?:for|in case) (?:after|when) (?:I'?m gone|I die)"
    clinical_shorthand:
      - "preparatory (?:acts?|behavior|behaviour)"
      - "pt (?:reports|endorses|describes) preparatory (?:behavior|acts?)"
    negation_phrases: ["denies", "no", "not", "never"]
    confidence: 0.95

  SH-007:  # Self-injury without suicidal intent (HIGH)
    patterns:
      - "(?:cutting|cut) (?:myself|himself|herself|themselves|themself|(?:my|his|her|their) (?:arms?|wrists?|legs?|thighs?))"
      - "(?:burning|burned|burnt) (?:myself|himself|herself|themselves|themself)"
      - "(?:hitting|hit|punching|punched) (?:myself|himself|herself|themselves|themself|(?:my|his|her|their) (?:head|face|body))"
      - "(?:scratching|scratched) (?:myself|himself|herself|themselves|themself|(?:my|his|her|their) (?:skin|arms?)) (?:until|till) (?:it )?(?:bleeds?|bled)"
      - "(?:biting|bit) (?:myself|himself|herself|themselves|themself)"
      - "(?:pulling|pulled?) (?:out )?(?:my |his |her |their )?hair"
      - "(?:banging|banged?) (?:my |his |her |their )?head"
      - "(?:hurting|hurt) (?:myself|himself|herself|themselves|themself) (?:on purpose|intentionally|deliberately)"
    clinical_shorthand:
      - "(?:NSSI|non-?suicidal self[- ]?injury) (?:present|endorsed|reported|active)"
      - "pt (?:c/o|reports|endorses) (?:NSSI|self[- ]?harm|self[- ]?injury|cutting)"
      - "(?:\\+|positive) (?:for )?(?:NSSI|self[- ]?harm)"
      - "self[- ]?injurious behavior"
    negation_phrases: ["denies", "no", "not", "never", "stopped", "(?:\\-|negative) (?:for )?(?:NSSI|self[- ]?harm)"]
    confidence: 0.91

  SH-008:  # History of attempt referenced (HIGH)
    patterns:
      - "(?:tried|attempted) to (?:kill myself|end my life|commit suicide)"
      - "(?:previous|prior|past|last) (?:suicide )?attempt"
      - "(?:overdosed|OD'?d) (?:before|previously|in the past|last (?:year|month|week|time))"
      - "(?:was|got) hospitalized (?:for|after) (?:a )?(?:suicide )?attempt"
      - "(?:I |he |she |they )?(?:survived|made) (?:a |an )?(?:suicide )?attempt"
      - "(?:history|hx) of (?:suicide )?attempt"
      - "(?:history|hx) of SI"
    clinical_shorthand:
      - "(?:hx|history) (?:of )?(?:SA|SI|suicide attempt)"
      - "prior (?:SA|attempt)"
      - "(?:previous|past) (?:SA|suicide attempt)"
      - "pt (?:reports|endorses) (?:prior|past|previous|hx of) attempt"
    negation_phrases: ["no (?:prior|previous|past) (?:attempts?|hx)", "denies (?:prior|previous|past) attempt"]
    confidence: 0.90

# =============================================================================
# HARM TO OTHERS (HO-001 through HO-006)
# =============================================================================

harm_to_others:
  HO-001:  # Homicidal ideation - nonspecific (CRITICAL)
    patterns:
      - "want(?:s|ed|ing)? to (?:hurt|harm|kill) (?:someone|people|them|him|her|others)"
      - "thinking (?:about|of) (?:hurting|harming|killing)"
      - "going to (?:hurt|harm|kill)"
      - "fantasiz(?:e|es|ing) about (?:violence|hurting|killing)"
      - "homicidal (?:thoughts?|ideation|feelings)"
    clinical_shorthand:
      - "pt (?:c/o|reports|endorses) HI"
      - "(?:\\+|positive) (?:for )?HI"
      - "HI (?:present|endorsed|reported|active)"
      - "\\bHI\\b"
    negation_phrases: ["don't", "no", "not", "never", "denies", "\\-HI", "(?:\\-|negative) (?:for )?HI"]
    confidence: 0.93

  HO-002:  # Homicidal ideation - specific target (CRITICAL)
    patterns:
      - "(?:want(?:s|ed|ing)?|going|plan(?:ning)?) to (?:kill|hurt|harm) (?:my |his |her |their )?(?:wife|husband|partner|spouse|girlfriend|boyfriend|ex|mother|father|mom|dad|boss|teacher|neighbor|roommate)"
      - "(?:want|going|plan(?:ning)?) to (?:kill|hurt|harm) (?:him|her|them) (?:for|because)"
      - "(?:I'?ll|I will|I'?m going to) (?:kill|hurt|get) (?:him|her|them)"
      - "know(?:s)? where (?:he|she|they) (?:lives?|works?|goes?)"
    clinical_shorthand:
      - "HI (?:with|w/) (?:specific |identified )?target"
      - "pt (?:reports|endorses|identifies) (?:specific )?target"
      - "(?:named|identified|specific) target"
    negation_phrases: ["denies", "no", "not", "never", "(?:\\-|negative) (?:for )?HI"]
    confidence: 0.94

  HO-003:  # Homicidal ideation - with plan (CRITICAL)
    patterns:
      - "(?:have|has|got) (?:a )?plan to (?:kill|hurt|harm|attack|get)"
      - "know(?:s)? (?:exactly )?(?:how|when|where) (?:I'?m |I am )?going to (?:do it|get (?:him|her|them)|hurt (?:him|her|them))"
      - "(?:bought|got|have) (?:a )?(?:gun|weapon|knife) (?:for|to use on|to (?:get|hurt|kill))"
      - "(?:waiting for|planning|picking) (?:the right )?(?:time|moment|opportunity) to"
    clinical_shorthand:
      - "HI (?:with|w/) plan"
      - "pt (?:reports|endorses|describes) (?:homicidal )?plan"
      - "(?:\\+|positive) (?:for )?HI (?:with|w/) plan"
    negation_phrases: ["denies", "no", "not", "never", "(?:\\-|negative) (?:for )?HI"]
    confidence: 0.95

  HO-004:  # Violent urges (HIGH)
    patterns:
      - "(?:urge|impulse|need) to (?:hit|punch|attack|hurt|strangle|choke)"
      - "(?:feel(?:s|ing)? like|afraid) (?:I'?m |I am )?going to (?:snap|lose (?:it|control)|explode|go off)"
      - "can'?t (?:control|contain|hold back) (?:myself|my (?:anger|rage|temper))"
      - "(?:so |really |extremely )?(?:angry|enraged|furious) (?:I )?(?:could|might|want to) (?:hurt|hit|punch|kill)"
      - "(?:fists?|hands?) (?:are )?(?:clenching|clenched|balled up|shaking)"
      - "seeing red"
    clinical_shorthand:
      - "(?:violent|aggressive) urges? (?:present|endorsed|reported)"
      - "pt (?:reports|endorses) (?:violent|aggressive) urges?"
      - "impulse control (?:concern|difficulty|problems?)"
    negation_phrases: ["denies", "no", "not", "used to", "no longer"]
    confidence: 0.89

  HO-005:  # Abuse disclosure - perpetrating (HIGH)
    patterns:
      - "(?:hit|struck|slapped|punched|kicked|choked|pushed|shoved|grabbed) (?:my |his |her |their )?(?:partner|wife|husband|spouse|girlfriend|boyfriend|child|kid|son|daughter)"
      - "(?:hurt|harmed|injured) (?:my |his |her |their )?(?:partner|wife|husband|spouse|girlfriend|boyfriend|child|kid)"
      - "(?:lost (?:my |his |her |their )?temper|blew up|went off) (?:on|at) (?:him|her|them|my)"
      - "put (?:my |his |her |their )?hands? on"
    clinical_shorthand:
      - "(?:DV|IPV|domestic violence) (?:perpetration|perpetrator)"
      - "pt (?:reports|discloses|admits) (?:hitting|hurting|abusing)"
    negation_phrases: ["denies", "no", "not", "never"]
    confidence: 0.88

  HO-006:  # Abuse disclosure - experiencing (HIGH)
    patterns:
      - "(?:partner|wife|husband|spouse|girlfriend|boyfriend|parent|father|mother|mom|dad) (?:hits?|struck|slaps?|punches?|kicks?|chokes?|pushes?|shoves?|grabs?|hurts?|abuses?|beats?) (?:me|him|her|them)"
      - "(?:being|getting|been) (?:hit|beaten|abused|assaulted|hurt|raped|molested) (?:by|at home)"
      - "(?:afraid|scared|terrified) of (?:my |his |her |their )?(?:partner|wife|husband|spouse|girlfriend|boyfriend|parent|father|mother)"
      - "(?:he|she|they|partner) (?:threatens?|threatened) to (?:kill|hurt|harm)"
      - "(?:forced|coerced|made) (?:me|him|her|them) to (?:have sex|do (?:things|sexual))"
      - "(?:can'?t|don'?t) feel safe (?:at home|around (?:him|her|them|my))"
    clinical_shorthand:
      - "(?:DV|IPV|domestic violence) (?:victim|survivor|disclosure)"
      - "pt (?:reports|discloses) (?:being )?(?:abused|assaulted|victimized)"
      - "(?:physical|sexual|emotional|domestic) abuse (?:disclosed|reported|endorsed)"
    negation_phrases: ["denies", "no", "not", "no longer", "used to"]
    confidence: 0.89

# =============================================================================
# MEDICATION NON-ADHERENCE (MED-001 through MED-005)
# =============================================================================

medication:
  MED-001:  # Non-adherence - stated (MEDIUM)
    patterns:
      - "stopped (?:taking )?(?:my |his |her |their |the )?(?:medication|meds|pills|prescription|[A-Z][a-z]{2,})"
      - "haven'?t (?:taken|been taking) (?:my |his |her |their |the )?(?:medication|meds)"
      - "ran out of (?:my |his |her |their |the )?(?:medication|meds|prescription)"
      - "can'?t afford (?:my |his |her |their |the )?(?:medication|meds|prescription)"
      - "not taking (?:my |his |her |their |the )?(?:medication|meds) (?:anymore|as prescribed)"
      - "skipping (?:my |his |her |their |the )?(?:medication|meds|doses)"
    clinical_shorthand:
      - "(?:med|medication) non-?adherence"
      - "non-?compliant (?:with|re:?) (?:meds|medication)"
    confidence: 0.88

  MED-002:  # Non-adherence - implied (MEDIUM)
    patterns:
      - "(?:forgot|forget|forgetting) to (?:take|pick up|refill) (?:my |the )?(?:medication|meds|pills|prescription)"
      - "(?:pharmacy|drugstore) (?:was |is )?(?:closed|out of (?:stock|it))"
      - "(?:prescription|rx) (?:expired|ran out|wasn'?t (?:ready|filled))"
      - "don'?t (?:like|want to|feel like) (?:taking|swallowing) (?:my |the )?(?:medication|meds|pills)"
      - "(?:keep|keeps?) (?:forgetting|missing) (?:my |the )?(?:doses?|medication|meds)"
      - "(?:insurance|coverage) (?:won'?t|doesn'?t) (?:cover|pay for) (?:my |the )?(?:medication|meds|prescription)"
      - "(?:haven'?t|have not) (?:picked up|refilled|gotten) (?:my |the )?(?:medication|meds|prescription)"
    confidence: 0.85

  MED-003:  # Medication misuse (HIGH)
    patterns:
      - "(?:taking|took|taken) (?:more|extra|double|triple) (?:my |the )?(?:dose|doses|medication|meds|pills)"
      - "(?:doubling|doubled) up (?:on )?(?:my |the )?(?:dose|doses|medication|meds)"
      - "(?:saving|saving up|stockpiling|hoarding|collecting) (?:my |his |her |their |the )?(?:pills|medication|meds)"
      - "(?:mixing|mix(?:ed)?) (?:my |the )?(?:medication|meds|pills) with (?:alcohol|booze|drinks?)"
      - "(?:taking|using) (?:someone else'?s|not my) (?:medication|meds|pills|prescription)"
      - "(?:crushing|snorting|injecting) (?:my |the )?(?:medication|meds|pills)"
    clinical_shorthand:
      - "(?:medication|med) misuse"
      - "pt (?:reports|endorses|admits) (?:med(?:ication)? )?(?:misuse|overuse)"
    negation_phrases: ["denies", "no", "not", "never"]
    confidence: 0.90

  MED-004:  # Adverse reaction reported (MEDIUM)
    patterns:
      - "(?:medication|meds|pills) (?:makes?|is making|made) (?:me |him |her |them )?(?:feel (?:sick|nauseous|dizzy|tired|drowsy|worse|terrible|awful|like a zombie|numb|flat|foggy)|sick|nauseous|dizzy)"
      - "(?:having|had|getting) (?:bad |terrible |serious )?(?:side effects?|reactions?) (?:from|to|with) (?:my |the )?(?:medication|meds)"
      - "(?:can'?t (?:sleep|eat|think|function|concentrate)|gained weight|feel(?:s|ing)? (?:numb|flat|like a zombie|foggy)) (?:since|after|from|on) (?:my |the )?(?:medication|meds)"
      - "(?:medication|meds|pills) (?:is|are) making (?:things|it|me) worse"
    clinical_shorthand:
      - "(?:adverse|side) (?:effect|reaction) (?:reported|endorsed)"
      - "pt (?:reports|c/o|endorses) (?:side effects?|adverse (?:effects?|reactions?))"
    confidence: 0.86

  MED-005:  # Desire to discontinue (MEDIUM)
    patterns:
      - "(?:want|going|plan(?:ning)?) to (?:stop|quit|come off|get off|discontinue) (?:taking )?(?:my |his |her |their |the )?(?:medication|meds|pills)"
      - "don'?t (?:want|need|think I need) (?:to take )?(?:my |the )?(?:medication|meds|pills) (?:anymore|any (?:longer|more))"
      - "(?:thinking|thought) (?:about|of) (?:stopping|quitting|going off) (?:my |the )?(?:medication|meds)"
      - "(?:tired|sick) of (?:taking|being on) (?:my |the )?(?:medication|meds|pills)"
      - "don'?t (?:think|believe) (?:my |the )?(?:medication|meds) (?:is|are) (?:working|helping|doing anything)"
    clinical_shorthand:
      - "pt (?:reports|expresses) desire to (?:d/c|discontinue|stop) (?:medication|meds)"
    confidence: 0.86

# =============================================================================
# SUBSTANCE USE (SU-001 through SU-005)
# =============================================================================

substance_use:
  SU-001:  # Active substance use disclosed (MEDIUM)
    patterns:
      - "(?:drinking|using|smoking) (?:daily|every (?:day|night)|regularly|heavily)"
      - "(?:use|uses|smoke|smokes|drink|drinks) (?:alcohol|weed|marijuana|pot|cannabis|meth|heroin|cocaine|crack|fentanyl|opioids?|benzos?)"
      - "(?:getting|get|been) (?:high|drunk|wasted|intoxicated) (?:regularly|often|frequently)"
      - "(?:still|currently) (?:using|drinking|smoking|getting high)"
      - "(?:substance|alcohol|drug) (?:abuse|dependence|addiction)"
    clinical_shorthand:
      - "(?:active|current) (?:substance|alcohol|drug) (?:use|abuse)"
      - "pt (?:reports|endorses|discloses|admits) (?:substance|alcohol|drug) use"
      - "(?:\\+|positive) (?:for )?(?:ETOH|substance use|drug use)"
    negation_phrases: ["denies", "no", "not", "sober", "clean", "in recovery", "(?:\\-|negative) (?:for )?(?:ETOH|substance)"]
    confidence: 0.85

  SU-002:  # Relapse indicator (HIGH)
    patterns:
      - "relapsed"
      - "(?:started|began) (?:using|drinking|smoking) again"
      - "(?:fell|falling) off the wagon"
      - "(?:picked|picking) (?:it )?(?:back )?up again"
      - "(?:went|going) back to (?:using|drinking|smoking|my old (?:habits|ways))"
      - "(?:was|had been) (?:sober|clean) (?:for |but )"
      - "(?:couldn'?t|can'?t) (?:stay|remain|keep) (?:sober|clean|away from)"
      - "(?:broke|breaking) (?:my )?sobriety"
    clinical_shorthand:
      - "(?:relapse|return to use) (?:reported|endorsed|disclosed)"
      - "pt (?:reports|endorses|discloses) relapse"
    negation_phrases: ["denies", "no", "not", "hasn't", "has not"]
    confidence: 0.90

  SU-003:  # Substance use escalation (HIGH)
    patterns:
      - "(?:using|drinking|smoking) (?:more|a lot more|way more) (?:than (?:before|usual|I used to))?"
      - "(?:increased|increasing|upped|doubled|tripled) (?:my |the )?(?:use|intake|drinking|amount)"
      - "(?:can'?t|don'?t|unable to) (?:stop|cut back|control|limit) (?:my )?(?:use|drinking|smoking|intake)"
      - "(?:need|needing) more to (?:feel|get) (?:the same|any) (?:effect|high|buzz|relief)"
      - "(?:lost|losing) control (?:of|over) (?:my )?(?:use|drinking|habit)"
      - "(?:went|going) from (?:occasional|weekend|social) to (?:daily|every day|constant)"
    clinical_shorthand:
      - "(?:substance|use) escalation"
      - "(?:increased|increasing) (?:tolerance|use|consumption)"
      - "pt (?:reports|endorses) (?:escalation|increased use|loss of control)"
    negation_phrases: ["denies", "no", "not", "stable", "same amount"]
    confidence: 0.87

  SU-004:  # Withdrawal symptoms (HIGH)
    patterns:
