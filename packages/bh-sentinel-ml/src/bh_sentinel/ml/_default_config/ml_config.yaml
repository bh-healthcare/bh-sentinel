# bh-sentinel-ml configuration
# Canonical source. The vendored copy at
# packages/bh-sentinel-ml/src/bh_sentinel/ml/_default_config/ml_config.yaml
# must stay byte-identical -- CI test_config_vendored.py enforces this.

# HuggingFace Hub model repo for the zero-shot NLI baseline. v0.2.2 pins
# a quantized ONNX export of FacebookAI/roberta-large-mnli, hosted under
# the bh-healthcare HF organization. See docs/ml-artifact-provenance.md
# for the full provenance chain (source revision, license verification
# gate, why facebook/bart-large-mnli was rejected at the v0.2.2 hotfix
# pass -- encoder-decoder + INT8 dynamic quantization collapses
# discrimination -- and why the original valhalla/distilbart-mnli-12-3
# candidate was rejected at the v0.2.1 license verification gate).
#
# Phase B (v0.3+) replaces this baseline with a fine-tuned clinical model
# per docs/architecture.md.
model_repo: bh-healthcare/roberta-large-mnli-int8-onnx

# Pinned revision SHA from HuggingFace Hub. Production cannot use `main`
# because the upstream model can change silently. Update this (and
# model_sha256 below) together when re-pinning -- see the re-pinning
# workflow in docs/ml-artifact-provenance.md, and use scripts/export_onnx.py
# to produce the new artifact.
model_revision: 69eb03178c210deceb076f0a8302bc5705179a58

# ONNX filename inside the HF repo or the local cache directory.
onnx_filename: model_int8.onnx

# SHA256 of the ONNX bytes. TransformerClassifier verifies this at load
# time to catch stale/tampered container bakes. Computed by
# scripts/export_onnx.py at export time and pinned here in lockstep with
# model_revision above.
model_sha256: "49fa5562da7f1422525e88fd1145d2d06ca93b17c335adf3c4696a30908c91de"

# Max tokens per sentence for NLI batching. RoBERTa-large handles 512 but
# clinical sentences rarely exceed ~200 tokens; 256 keeps the tensor
# allocations predictable.
max_sentence_length: 256

# Max (sentence, hypothesis) pairs in a single ONNX forward pass. Larger
# batches improve throughput but raise peak memory. 32 is a safe middle
# ground for CPU inference.
max_batch_size: 32

# Per-flag confidence floor. Layer 2 candidates below this threshold are
# dropped before the merge (architecture section 4.5, Layer 2). The
# merge (section 4.7) takes max(L1, L2), so a candidate that clears this
# threshold can still lose to L1 on the final flag record.
min_emit_confidence: 0.55

# Confidence calibration for Layer 2 softmax outputs.
# Phase A (v0.2): fixed_discount with factor 0.85 per architecture
# section 4.8. Phase B (v0.3): temperature_scaling once labeled clinical
# data is available.
calibration:
  strategy: fixed_discount
  discount: 0.85
