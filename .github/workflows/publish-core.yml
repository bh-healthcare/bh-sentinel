name: Publish bh-sentinel-core to PyPI

on:
  push:
    tags:
      - "core-v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag version matches pyproject.toml
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#core-v}"
          PYPROJECT_VERSION=$(grep -m1 '^version' packages/bh-sentinel-core/pyproject.toml | sed -E 's/.*"(.*)".*/\1/')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $TAG_NAME implies version $TAG_VERSION but pyproject.toml has $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Tag and pyproject.toml agree on version $TAG_VERSION"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build bh-sentinel-core
        run: python -m build packages/bh-sentinel-core/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bh-sentinel-core-dist
          path: packages/bh-sentinel-core/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bh-sentinel-core-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bh-sentinel-core-dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#core-v}"
          gh release create "$TAG_NAME" dist/* \
            --title "bh-sentinel-core $TAG_VERSION" \
            --generate-notes
