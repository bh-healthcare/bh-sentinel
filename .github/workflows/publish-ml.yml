name: Publish bh-sentinel-ml to PyPI

on:
  push:
    tags:
      - "ml-v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag version matches pyproject.toml
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#ml-v}"
          PYPROJECT_VERSION=$(grep -m1 '^version' packages/bh-sentinel-ml/pyproject.toml | sed -E 's/.*"(.*)".*/\1/')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $TAG_NAME implies version $TAG_VERSION but pyproject.toml has $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Tag and pyproject.toml agree on version $TAG_VERSION"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      # TODO(bh-sentinel-ml 0.2.1): enable this step once ml_config.yaml
      # pins a real model_revision + model_sha256. Runs the download CLI
      # against the pinned revision to confirm the HF Hub artifact is
      # still reachable with the committed digest. Currently disabled
      # because the v0.2.0 placeholder SHA would always fail the verify.
      #
      # - name: Verify pinned model is still available on HF Hub
      #   run: |
      #     python -m pip install "packages/bh-sentinel-ml[dev]"
      #     PIN_REVISION=$(grep -m1 '^model_revision' packages/bh-sentinel-ml/src/bh_sentinel/ml/_default_config/ml_config.yaml | awk '{print $2}')
      #     PIN_SHA=$(grep -m1 '^model_sha256' packages/bh-sentinel-ml/src/bh_sentinel/ml/_default_config/ml_config.yaml | sed -E 's/.*"(.*)".*/\1/')
      #     bh-sentinel-ml download-model \
      #       --revision "$PIN_REVISION" \
      #       --output ./model-verify \
      #       --verify-sha256 "$PIN_SHA"

      - name: Build bh-sentinel-ml
        run: python -m build packages/bh-sentinel-ml/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bh-sentinel-ml-dist
          path: packages/bh-sentinel-ml/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bh-sentinel-ml-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bh-sentinel-ml-dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#ml-v}"
          gh release create "$TAG_NAME" dist/* \
            --title "bh-sentinel-ml $TAG_VERSION" \
            --generate-notes
